<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
   
   <img src="images/map.png" alt="Indian map" usemap="#indiamap">
   <map name="indiamap" >
    <area shape="rect" coords="100,200,300,300" href="https://www.mapsofindia.com/maps/madhyapradesh/" alt="">
   </map>
   <h1>The figure and figcaption element</h1>
   <figure>
<img src="images/worldcup.webp" alt="" width="400" >
<figcaption>
    India won the T20 world cup 
</figcaption>
   </figure>
   <picture>
    <source media="(min-width: 850px)" srcset="viratkpic1.jpg" width="400">
    <source media="(min-width: 400px)" srcset="viratkpic2.webp" width="400">
    <img src="viratkpic3.jpg" alt=""  width="400">
</picture> 

<svg width="100" height="100">
    <circle cx="50" cy="50" r="40" stroke="green" stroke-width="4" fill="yellow" />
  </svg>
</body>
</html>
